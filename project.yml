name: MicBar
options:
  bundleIdPrefix: com.boss
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    ARCHS: arm64
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64 i386
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.0"

targets:
  MicBar:
    type: application
    platform: macOS
    sources:
      - path: MicBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boss.MicBar
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          # Build directly into /Applications so Launchpad/Spotlight never see a second copy in DerivedData.
          CONFIGURATION_BUILD_DIR: /Applications
    dependencies:
      - sdk: CoreAudio.framework
    postBuildScripts:
      - name: Register installed app only
        basedOnDependencyAnalysis: false
        script: |
          LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister"
          APP="/Applications/${WRAPPER_NAME}"
          if [ -d "$APP" ]; then
            "$LSREGISTER" -f -R -trusted "$APP" >/dev/null 2>&1 || true
          fi
          # Remove legacy DerivedData copies that cause duplicate Launchpad icons.
          find "${HOME}/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/*/MicBar.app" -print0 2>/dev/null \
            | xargs -0 rm -rf 2>/dev/null || true

  MicBarSpike:
    type: tool
    platform: macOS
    sources:
      - path: MicBarSpike
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boss.MicBarSpike
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - sdk: CoreAudio.framework

  MicBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MicBarTests
    dependencies:
      - target: MicBar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.boss.MicBarTests

schemes:
  MicBar:
    build:
      targets:
        MicBar: all
        MicBarTests: [test]
    test:
      targets:
        - MicBarTests
  MicBarSpike:
    build:
      targets:
        MicBarSpike: all
